<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Playground</title>
        <script>
            // Encode the current path into a query string and redirect to index.html
            // so GitHub Pages serves it. The script in index.html decodes it back.
            var l = window.location;
            l.replace(
                l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    l.pathname
                        .split('/')
                        .slice(0, 1 + 1)
                        .join('/') +
                    '/?/' +
                    l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash
            );
        </script>
    </head>
    <body></body>
</html>
